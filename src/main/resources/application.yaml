spring:
  application:
    name: delivery-api

  security:
    user:
      name: admin@gmail.com
      password: admin123

#  cache:
#    type: simple

  datasource:
    url: jdbc:h2:mem:deliverydb
#    url: jdbc:h2:file:/data/deliverydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  devtools:
    restart:
      enabled: true

logging:
  level:
    root: info
    com:
      deliverytech: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  tracing:
    sampling:
      probability: 1.0



server:
  port: 8080
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  show-actuator: true
  group-configs[0]:
    group: "1. DeliveryTech API"
    paths-to-match: "/api/**"
  group-configs[1]:
    group: "2. Monitoramento (Actuator)"
    paths-to-match: "/actuator/**"
