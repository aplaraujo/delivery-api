spring:
  application:
    name: delivery-api

  datasource:
    url: jdbc:h2:mem:deliverydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  devtools:
    restart:
      enabled: true

logging:
  level:
    org:
      springframework:
        web: DEBUG

server:
  port: 8080
