spring:
  application:
    name: delivery-api

  security:
    user:
      name: admin@gmail.com
      password: admin123

  cache:
    type: simple

  datasource:
    url: jdbc:h2:mem:deliverydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  devtools:
    restart:
      enabled: true

logging:
  level:
    root: info
    com:
      deliverytech: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: *

  endpoint:
    health:
      show-details: always

server:
  port: 8080
